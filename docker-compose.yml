services:
  frontend:
    build:
      context: .
      target: development
    container_name: pdf-ai-chatbot-frontend
    ports:
      - "5173:5173"
    env_file:
      - ./src/.env
    volumes:
      - .:/app
      - frontend_node_modules:/app/node_modules
    command: npm run dev -- --host 0.0.0.0 --port 5173
    restart: unless-stopped

volumes:
  frontend_node_modules:

